services:
  apiserver:
    image: ${MIKRO_IMAGE:-psanders/mikro:latest}
    container_name: mikro-apiserver
    restart: unless-stopped
    ports:
      - 4000:4000
    environment:
      - MIKRO_CONFIG_FILE=/app/mikro.json
    volumes:
      # Mikro configuration
      - ./mikro.json:/app/mikro.json:ro
      # Database persistence
      - ./data:/app/data
      # Signing keys for receipts
      - ./keys:/app/keys
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:4000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"
        ]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    networks:
      - mikro-network

networks:
  mikro-network:
    driver: bridge
