            skipResponseCheck: true
            tools:
              - name: getApplicationState
                mockResponse:
                  success: true
                  message: Estado de solicitud obtenido
                  data:
                    sessionId: session-test-001
                    filledFields:
                      firstName: Juan
                      lastName: Pérez
                      phone: "+18091234567"
                      idNumber: "001-0000000-1"
                    missingFields:
                      - province
                      - businessType
                      - monthlySales
                      - requestedAmount
                      - requestedTermWeeks
                      - businessAge
                      - formalization
                      - purpose
                      - homeAddress
                      - referenceName
                      - referencePhone
                    simulatedIsc: 8
                    isOutOfZone: false
                    isCriticalBusiness: false
          - human: Puerto Plata, tengo un colmado
            expectedAI: "Perfecto. ¿Cuánto vende tu negocio al mes aproximadamente? ¿Cuánto necesitas en préstamo? ¿En cuántas semanas planeas pagarlo?"
            # Batch size (2-3 questions) varies; assert the saveAnswer call, not wording.
            skipResponseCheck: true
            tools:
              - name: saveAnswer
                mockResponse:
                  success: true
                  message: "Campos guardados: province, businessType"
                  data:
                    saved: [province, businessType]
                    invalid: []
                    invalidReasons: {}
                    simulatedIsc: 28
                    isOutOfZone: false
                    isCriticalBusiness: false
                    missingFields:
                      - monthlySales
                      - requestedAmount
                      - requestedTermWeeks
                      - businessAge
                      - formalization
                      - purpose
                      - homeAddress
                      - referenceName
                      - referencePhone
          - human: Vendo como 80 mil al mes, necesito 25 mil y lo pago en 12 semanas
            expectedAI: "¡Listo, Juan! Tu información está completa. Un asesor la revisará y te contactará en horario laboral (lunes a viernes). ¡Gracias por tu interés!"
            skipResponseCheck: true
            tools:
              - name: saveAnswer
                mockResponse:
                  success: true
                  message: "Campos guardados: monthlySales, requestedAmount, requestedTermWeeks"
                  data:
                    saved: [monthlySales, requestedAmount, requestedTermWeeks]
                    invalid: []
                    invalidReasons: {}
