# Evaluator — Documentos upload/remove (#65)
#
# Covers: the DOCUMENTOS rows on "Datos de la solicitud" upload via the capture
# pipeline (camera stubbed in e2e) and flip to a "Reemplazar" + remove state,
# and that remove clears them back to "Subir". The mutations are mocked
# (uploadIdImage / deleteIdImage) so this asserts the UI state machine, not real
# file storage.
#
# REQUIRES an e2e build (see evaluator-solicitud-datos.yaml header):
#   EXPO_PUBLIC_E2E=1 EXPO_PUBLIC_E2E_ROLE=REVIEWER npx expo run:ios --port 8082
#   maestro test .maestro/evaluator-documentos.yaml
appId: do.mikro.app
---
# Dev-client build: load the e2e bundle directly via the dev-launcher deep link
# (see evaluator-solicitud-datos.yaml header). Assumes Metro on :8082.
- launchApp
- openLink: "exp+mikro://expo-development-client/?url=http://localhost:8082"
# A dev build shows the expo-dev-client onboarding sheet on first launch — dismiss if present.
- tapOn:
    text: "Continue"
    optional: true
- extendedWaitUntil:
    visible: "EVALUACIONES DE HOY"
    timeout: 30000

- tapOn:
    id: "tab-cola"
- tapOn:
    id: "solicitud-e2e-app-0001"
- extendedWaitUntil:
    visible: "MIKRO SCORE"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Ver datos de la solicitud"
    direction: DOWN
- tapOn: "Ver datos de la solicitud"
- extendedWaitUntil:
    visible: "SOLICITANTE"
    timeout: 15000

# Upload the cédula front — stubbed capture -> uploadIdImage -> refetch flips
# the row to "Reemplazar" and reveals the remove control.
- scrollUntilVisible:
    element:
      id: "doc-id-front"
    direction: DOWN
- tapOn:
    id: "doc-id-front-action"
- extendedWaitUntil:
    visible:
      id: "doc-id-front-remove"
    timeout: 15000

# Remove it — confirm dialog -> deleteIdImage -> row returns to "Subir".
- tapOn:
    id: "doc-id-front-remove"
- extendedWaitUntil:
    visible: "Eliminar documento"
    timeout: 10000
- tapOn: "Eliminar"
- extendedWaitUntil:
    notVisible:
      id: "doc-id-front-remove"
    timeout: 15000
