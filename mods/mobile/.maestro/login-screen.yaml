# Minimal smoke flow: a clean install boots to the login screen. This is the
# entire e2e suite for now — the previous suite never passed in CI, so we are
# rebuilding from the smallest thing that works. Do not set EXPO_PUBLIC_E2E
# when running this: that flag injects a fake token and skips login entirely.
#
# APP_ID must be passed explicitly (-e APP_ID=...): the iOS bundle id is
# do.mikro.app, Android's applicationId is do_.mikro.app ("do" is a Java
# keyword, so Expo prebuild sanitizes the first segment). No env default
# here on purpose — a flow-header env SHADOWS the CLI -e parameter in
# Maestro, which silently launched the wrong id on Android CI.
appId: ${APP_ID}
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Bienvenido."
    timeout: 30000
- assertVisible:
    id: "phone-input"
- assertVisible:
    id: "password-input"
- assertVisible: "Iniciar sesión"
