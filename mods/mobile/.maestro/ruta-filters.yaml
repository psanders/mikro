appId: do.mikro.app
---
- runFlow: subflows/unlock.yaml
- tapOn:
    text: "Ruta"
    index: 1
- extendedWaitUntil:
    visible:
      id: "filter-all"
    timeout: 5000
# Test "Atrasadas" filter
- tapOn:
    id: "filter-late"
- extendedWaitUntil:
    visible:
      id: "visit-1004"
    timeout: 3000
- assertVisible:
    id: "visit-1004"
# Test "Hechas" filter
- tapOn:
    id: "filter-done"
- extendedWaitUntil:
    visible:
      id: "visit-1001"
    timeout: 3000
- assertVisible:
    id: "visit-1001"
# Return to all
- tapOn:
    id: "filter-all"
- extendedWaitUntil:
    visible:
      id: "visit-1003"
    timeout: 3000
