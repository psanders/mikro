appId: do.mikro.app
---
- runFlow: subflows/unlock.yaml
- tapOn:
    text: "Ruta"
    index: 1
- extendedWaitUntil:
    visible:
      id: "visit-1003"
    timeout: 5000
- tapOn:
    id: "visit-1003"
- extendedWaitUntil:
    visible: "Cliente"
    timeout: 5000
- tapOn: "1003"
- extendedWaitUntil:
    visible: "Cobrar"
    timeout: 5000
- tapOn: "Cobrar"
- extendedWaitUntil:
    visible: "Registrar cobro"
    timeout: 5000
- assertVisible: "MONTO A COBRAR"
- tapOn: "Confirmar y cobrar"
- extendedWaitUntil:
    visible: "Pago registrado"
    timeout: 10000
- assertVisible: "TOTAL COBRADO"
- tapOn: "Listo"
- extendedWaitUntil:
    visible: "META DE HOY"
    timeout: 5000
