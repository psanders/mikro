# Evaluator — Actividad (#67)
#
# Covers: the "ACTIVIDAD" row on "Datos de la solicitud" shows a live event
# count ("Ver actividad · N eventos"), and tapping it opens the activity
# screen with the seeded event summaries (newest first) — the
# listApplicationEvents round trip, reviewer-scoped and payment-free (#73).
#
# REQUIRES an e2e build (see evaluator-solicitud-datos.yaml header):
#   EXPO_PUBLIC_E2E=1 EXPO_PUBLIC_E2E_ROLE=REVIEWER npx expo run:ios --port 8082
#   maestro test .maestro/evaluator-actividad.yaml
appId: do.mikro.app
---
- launchApp
- openLink: "exp+mikro://expo-development-client/?url=http://localhost:8082"
- tapOn:
    text: "Continue"
    optional: true
- extendedWaitUntil:
    visible: "EVALUACIONES DE HOY"
    timeout: 30000

- tapOn:
    id: "tab-cola"
- tapOn:
    id: "solicitud-e2e-app-0001"
- extendedWaitUntil:
    visible: "MIKRO SCORE"
    timeout: 15000
- scrollUntilVisible:
    element:
      text: "Ver datos de la solicitud"
    direction: DOWN
- tapOn: "Ver datos de la solicitud"
- extendedWaitUntil:
    visible: "SOLICITANTE"
    timeout: 15000

# The row shows the seeded count once the events query resolves.
- scrollUntilVisible:
    element:
      id: "view-activity"
    direction: DOWN
- extendedWaitUntil:
    visible: "Ver actividad · 2 eventos"
    timeout: 15000

- tapOn:
    id: "view-activity"
- extendedWaitUntil:
    visible: "Actividad"
    timeout: 15000
# Newest first: the "approved"/claimed event before the "received" one.
- assertVisible: "Solicitud de Ramón Objío tomada para revisión"
- assertVisible: "Solicitud de Ramón Objío recibida"
- assertVisible: "Pedro Test"
