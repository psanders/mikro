[package]
name = "mikro-dashboard"
version = "0.0.0"
description = "Mikro operations dashboard"
edition = "2021"
rust-version = "1.77.2"

# The library is what Tauri's mobile entry points and the desktop binary share.
[lib]
name = "mikro_dashboard_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
