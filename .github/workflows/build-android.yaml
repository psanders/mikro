name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mods/mobile/**"
      - "mods/common/**"
      - "package.json"
      - "package-lock.json"

# contents: write lets the job attach the APK to the consolidated GitHub
# Release on release commits (see the attach step below).
permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://mikro.ngrok-free.dev' }}
      COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "17"

      # Keyed on mobile package.json + lockfile because expo prebuild generates
      # build.gradle from those — we can't hash generated files that don't exist yet.
      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('mods/mobile/package.json', 'mods/mobile/app.config.ts', 'package-lock.json') }}
          restore-keys: gradle-

      - name: Cache Maven local repository
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('mods/mobile/package.json', 'package-lock.json') }}
          restore-keys: m2-

      - name: Install dependencies
        run: npm ci

      # --clean removes any stale android/ directory before regenerating
      - name: Generate native Android project
        working-directory: mods/mobile
        run: npx expo prebuild --platform android --clean

      # The Expo template defaults to -Xmx2048m -XX:MaxMetaspaceSize=512m,
      # which the expo-updates Kotlin/KSP compile blows through (endless
      # "OutOfMemoryError: Metaspace" — reproduced locally and on CI).
      # gradle.properties is generated by prebuild, so the bump lives here.
      # EAS's own workers run -Xmx5g/-XX:MaxMetaspaceSize=1g on comparable
      # builds; ubuntu-latest runners have 16 GB.
      - name: Raise Gradle JVM memory
        working-directory: mods/mobile/android
        run: |
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1g/' gradle.properties
          grep '^org.gradle.jvmargs=' gradle.properties

      # assembleRelease bundles the JS into the APK so it runs standalone (no Metro).
      # Expo's prebuild template signs release with the debug keystore, so the APK
      # installs without any signing secrets — fine for internal distribution.
      # --no-daemon prevents orphaned Gradle processes on the runner.
      - name: Build release APK
        working-directory: mods/mobile/android
        run: ./gradlew assembleRelease --no-daemon

      # Release commits (pushed by release.yaml) carry a vX.Y.Z tag on HEAD.
      # Attach the APK to that tag's GitHub Release so it lands on the
      # consolidated release page permanently, instead of expiring with the
      # 30-day workflow artifact. release.yaml creates the Release seconds
      # after pushing the tag — long before Gradle finishes here — but the
      # retry loop covers any gap. Non-release pushes skip this step.
      - name: Attach APK to GitHub Release (release commits only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags --quiet
          tag="$(git tag --points-at HEAD | grep '^v' | head -1 || true)"
          if [ -z "$tag" ]; then
            echo "HEAD is not a release commit; keeping the workflow artifact only"
            exit 0
          fi
          cp mods/mobile/android/app/build/outputs/apk/release/app-release.apk "mikro-$tag-android.apk"
          for attempt in 1 2 3 4 5; do
            if gh release upload "$tag" "mikro-$tag-android.apk" --clobber; then
              echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
              exit 0
            fi
            echo "Release $tag not ready yet (attempt $attempt); retrying in 60s"
            sleep 60
          done
          echo "::warning::Could not attach APK to release $tag"

      - name: Upload APK
        id: upload-apk
        uses: actions/upload-artifact@v7
        with:
          name: mikro-android-${{ github.run_number }}-${{ github.sha }}
          path: mods/mobile/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # One-stop note on the run's Summary page so nobody digs through the
      # Artifacts section (or the logs) to find the APK.
      - name: Add build links to job summary
        run: |
          {
            echo "### 📦 Android APK"
            echo "- Download: [mikro-android-${{ github.run_number }}-${{ github.sha }}](${{ steps.upload-apk.outputs.artifact-url }})"
            echo "- Retention: 30 days"
            if [ -n "$RELEASE_TAG" ]; then
              echo "- Release: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
