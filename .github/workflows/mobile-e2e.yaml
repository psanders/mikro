name: Mobile E2E Tests

# Runs Maestro against the APK already built by build-android.yaml instead of
# rebuilding the app (the old suite spent 20+ minutes on npm ci + prebuild +
# Gradle before ever starting the emulator). Triggered automatically after a
# successful "Build Android APK" run (reusing that run's artifact), or manually
# via dispatch (which picks the latest successful build).
#
# The suite was reset to a single smoke flow — boot a clean install and assert
# the login screen renders (.maestro/login-screen.yaml). The previous suite
# never passed in CI; grow from green rather than fixing flows that never
# worked. The release APK bakes EXPO_PUBLIC_API_URL at build time, which is
# fine: the login screen renders without any backend.
#
# .maestro/evaluator-golden-path.yaml and evaluator-reject-path.yaml are
# intentionally NOT run here. They rely on the EXPO_PUBLIC_E2E fake-login
# bridge (see app/index.tsx), which must be baked in at JS-bundle build time —
# this "preview" release profile never sets it (eas.json), so those flows
# would just hit the real, unauthenticated login screen and fail. Run them
# locally against an EXPO_PUBLIC_E2E=1 dev-client build instead (see each
# flow file's header comment). Wiring a seeded-backend dev-client build into
# this job is a follow-up, not done here.

on:
  workflow_run:
    workflows: ["Build Android APK"]
    types: [completed]
  workflow_dispatch:
    inputs:
      release_android:
        description: "Release Android build to Google Play"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  e2e-android:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Only needed for the .maestro flows; the APK comes from build-android.
      - uses: actions/checkout@v6

      - name: Download APK from build-android
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            run_id="${{ github.event.workflow_run.id }}"
          else
            run_id=$(gh run list --repo "$GITHUB_REPOSITORY" \
              --workflow build-android.yaml --status success --limit 1 \
              --json databaseId -q '.[0].databaseId')
          fi
          if [ -z "$run_id" ]; then
            echo "No successful Build Android APK run found" >&2
            exit 1
          fi
          echo "Using APK from build-android run $run_id"
          gh run download "$run_id" --repo "$GITHUB_REPOSITORY" \
            --pattern 'mikro-android-*' --dir apk
          apk_path=$(find apk -name '*.apk' | head -1)
          if [ -z "$apk_path" ]; then
            echo "No APK found in run $run_id artifacts" >&2
            exit 1
          fi
          echo "APK_PATH=$apk_path" >> "$GITHUB_ENV"

      - name: Cache Maestro CLI
        id: maestro-cache
        uses: actions/cache@v5
        with:
          path: ${{ env.HOME }}/.maestro
          key: maestro-${{ runner.os }}

      - name: Install Maestro
        if: steps.maestro-cache.outputs.cache-hit != 'true'
        run: curl -Ls "https://get.maestro.mobile.dev" | bash

      - name: Add Maestro to PATH
        run: echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Cache AVD snapshot
        uses: actions/cache@v5
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-34-${{ runner.os }}

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: echo "AVD snapshot created"

      - name: Run Maestro e2e tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb install "$APK_PATH"
            maestro test mods/mobile/.maestro/login-screen.yaml

      - name: Upload Maestro artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-artifacts
          path: ~/.maestro/tests/
          retention-days: 7

  release-android:
    needs: e2e-android
    if: github.event_name == 'workflow_dispatch' && inputs.release_android == true
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (internal distribution)
        working-directory: mods/mobile
        run: eas build --platform android --profile preview --non-interactive
