name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "mods/common/src/utils/calculateLoan.ts"
      - "mods/common/src/utils/loanCalculatorConstants.ts"
  workflow_dispatch:

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      # Site builds from @mikro/common's source via vite aliases, so it doesn't
      # need the root "prepare" hook (husky + @mikro/common build). Skipping
      # scripts avoids building common, whose deps aren't installed in this
      # site-scoped install.
      #
      - name: Install dependencies
        run: npm ci --workspace=site --include-workspace-root --ignore-scripts

      # vite 8 (rolldown), @tailwindcss/oxide and lightningcss ship their native
      # engines as platform-specific optional dependencies, but the committed
      # lockfile only records the author's platform (darwin-arm64) — a known npm
      # optional-deps bug. `npm ci` honors that pruned set verbatim, so the
      # linux-x64 runner is left without bindings and `vite build` dies with
      # MODULE_NOT_FOUND. Install the matching linux binaries explicitly, each
      # pinned to its parent's resolved version. (Deleting the lockfile to force
      # re-resolution is not viable here: it drags the whole monorepo into the
      # install and trips an unrelated @mikro/mobile peer-dep conflict.)
      - name: Install linux native engines
        run: |
          ver() { node -p "require('./node_modules/$1/package.json').version"; }
          npm install --no-save --ignore-scripts \
            "@rolldown/binding-linux-x64-gnu@$(ver rolldown)" \
            "@tailwindcss/oxide-linux-x64-gnu@$(ver @tailwindcss/oxide)" \
            "lightningcss-linux-x64-gnu@$(ver lightningcss)"

      - name: Build site
        env:
          VITE_APPLICATIONS_URL: ${{ secrets.VITE_APPLICATIONS_URL }}
        run: npm run build --workspace=site

      # Static check over the JSX source: dead CTAs (buttons with no
      # onClick/submit) and internal <Route>/external link targets that no
      # longer resolve. Blocks deploy if it finds any.
      - name: Check for broken links and dead CTAs
        run: npm run check-links --workspace=site

      - name: Prepare deploy
        run: |
          cp -r site/dist /tmp/deploy
          cp /tmp/deploy/index.html /tmp/deploy/404.html
          echo "mikro.do" > /tmp/deploy/CNAME

      - name: Deploy to mikrosite
        run: |
          cd /tmp/deploy
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add origin https://x-access-token:${{ secrets.MIKROSITE_DEPLOY_TOKEN }}@github.com/psanders/mikrosite.git
          git checkout -b main
          git add -A
          git commit -m "Deploy from mikro@${GITHUB_SHA::7}"
          git push --force origin main
