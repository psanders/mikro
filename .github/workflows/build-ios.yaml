name: Build iOS (EAS)

# Triggers an EAS *cloud* build — nothing compiles on a macOS runner (10x
# minutes multiplier; see AGENTS.md). The ubuntu runner kicks off the build
# and waits on EAS, which owns the Apple signing credentials.
#
# - workflow_dispatch: pick a profile (default preview = internal
#   distribution, installable on registered devices)
# - v* tag (pushed by release.yaml): production build; the resulting IPA is
#   attached to the consolidated GitHub Release (App Store distribution —
#   submit it with `eas submit --platform ios`)
#
# Deliberately NOT run on every main push (unlike build-android): each run
# spends EAS build credits, so iOS builds are on-demand + per-release only.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        type: choice
        options: [preview, development, production]
        default: preview
  push:
    tags:
      - "v*"

# Queue rather than cancel: an in-flight EAS build keeps consuming credits
# even if the runner that started it dies.
concurrency:
  group: build-ios-${{ github.ref }}
  cancel-in-progress: false

# contents: write lets tag builds attach the IPA to the GitHub Release.
permissions:
  contents: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  build-ios:
    runs-on: ubuntu-latest
    # EAS iOS builds regularly take 20-40 min including queue time.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Tag builds are releases → production profile; dispatch uses the input.
      - name: Resolve build profile
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "PROFILE=production" >> "$GITHUB_ENV"
          else
            echo "PROFILE=${{ inputs.profile }}" >> "$GITHUB_ENV"
          fi
          echo "Building with profile: $(grep PROFILE "$GITHUB_ENV")"

      - name: Build iOS on EAS
        working-directory: mods/mobile
        run: eas build --platform ios --profile "$PROFILE" --non-interactive

      # Same note the local npm build scripts print: build page + direct
      # artifact URL on the run's Summary page.
      - name: Add build links to job summary
        working-directory: mods/mobile
        run: node .scripts/print-build-link.mjs ios >> "$GITHUB_STEP_SUMMARY"

      # Consolidated release page: pull the IPA from EAS and attach it to the
      # tag's Release next to the desktop installers and Android APK. eas-cli
      # prints banners on stderr; stdout is clean JSON.
      - name: Attach IPA to GitHub Release (tag builds only)
        if: github.ref_type == 'tag'
        working-directory: mods/mobile
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          url="$(eas build:list --platform ios --limit 1 --non-interactive --json 2>/dev/null \
            | node -p 'JSON.parse(require("fs").readFileSync(0, "utf8"))[0]?.artifacts?.applicationArchiveUrl ?? ""')"
          if [ -z "$url" ]; then
            echo "::warning::No IPA artifact URL on the latest EAS build; skipping release attach"
            exit 0
          fi
          curl -fsSL "$url" -o "mikro-$TAG-ios.ipa"
          gh release upload "$TAG" "mikro-$TAG-ios.ipa" --clobber
