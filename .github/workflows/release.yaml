name: Release

# Conventional-commits autobump. On every push to main, lerna inspects the
# commits since the last vX.Y.Z tag and, if any are releasable (feat -> minor,
# fix -> patch, BREAKING CHANGE -> major), bumps lerna.json + all mods/*
# packages, writes CHANGELOG, commits "chore(release): publish vX.Y.Z", and
# pushes the commit and tag. The vX.Y.Z tag then triggers publish-apiserver.yaml.
#
# Requires a RELEASE_TOKEN secret (a PAT or fine-grained token with contents:write).
# The default GITHUB_TOKEN cannot be used here: tags it pushes do NOT trigger
# other workflows, so the publish job would never fire.

on:
  push:
    branches: [main]
    paths:
      - "mods/**"
      - "package.json"
      - "package-lock.json"
      - "lerna.json"
  workflow_dispatch:
    inputs:
      # Lerna only cuts a version when commits touch a lerna package
      # (mods/common|agents|apiserver|ctl). Dashboard/mobile/CI-only changes
      # never trigger one on their own — this forces a release that includes
      # them (version bump still derived from conventional commits).
      force_release:
        description: "Force a release even if no lerna package changed"
        type: boolean
        default: false

# Never run two releases at once; don't cancel an in-flight one mid-push.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest (avoid EBEHIND if commits land during runner startup)
        run: git pull --rebase origin main

      - name: Version and tag
        run: npx lerna version --conventional-commits --yes ${{ inputs.force_release && '--force-publish' || '' }}

      # Consolidated release page. Every build a release produces reports into
      # this one GitHub Release, so nothing has to be chased across workflow
      # runs:
      #   - Desktop installers + updater files: attached by build-dashboard
      #     (tauri-action appends to an existing release)
      #   - Android APK: attached by build-android (it fires on the release
      #     commit because lerna bumps package-lock.json)
      #   - Docker image and iOS EAS links are deterministic, so written here
      # GITHUB_TOKEN is fine for creating it: no workflow listens to release
      # events (downstream workflows trigger on the tag push, which used
      # RELEASE_TOKEN).
      - name: Create consolidated release page
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(git tag --points-at HEAD | grep '^v' | head -1 || true)"
          if [ -z "$tag" ]; then
            echo "No release tag on HEAD (lerna released nothing); skipping"
            exit 0
          fi
          # The release commit push re-triggers this workflow; lerna no-ops
          # but HEAD still carries the tag — don't recreate the release.
          if gh release view "$tag" --json name >/dev/null 2>&1; then
            echo "Release $tag already exists; skipping"
            exit 0
          fi
          version="${tag#v}"
          workflows="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/workflows"
          cat > /tmp/build-outputs.md <<EOF
          ## 📦 Build outputs

          Everything $tag produces, in one place. Files attach below as their
          workflows finish (desktop installers and the Android APK take a few
          minutes after the tag).

          - **Desktop** (macOS \`.dmg\`, Windows \`.msi\`/\`.exe\`, updater files) — attached below by [Build Dashboard]($workflows/build-dashboard.yaml)
          - **Android APK** — attached below by [Build Android APK]($workflows/build-android.yaml)
          - **iOS** (\`.ipa\`, App Store distribution) — attached below by [Build iOS (EAS)]($workflows/build-ios.yaml); submit with \`eas submit --platform ios\` → [EAS builds page](https://expo.dev/accounts/psanders/projects/mikro/builds)
          - **API server** — \`docker pull psanders/mikro:$version\` → [Docker Hub](https://hub.docker.com/r/psanders/mikro/tags)
          EOF
          gh release create "$tag" --verify-tag --title "Mikro $tag" \
            --generate-notes --notes-file /tmp/build-outputs.md
