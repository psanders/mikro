name: Release

# Conventional-commits autobump. On every push to main, lerna inspects the
# commits since the last vX.Y.Z tag and, if any are releasable (feat -> minor,
# fix -> patch, BREAKING CHANGE -> major), bumps lerna.json + all mods/*
# packages, writes CHANGELOG, commits "chore(release): publish vX.Y.Z", and
# pushes the commit and tag. The vX.Y.Z tag then triggers publish-apiserver.yaml.
#
# Requires a RELEASE_TOKEN secret (a PAT or fine-grained token with contents:write).
# The default GITHUB_TOKEN cannot be used here: tags it pushes do NOT trigger
# other workflows, so the publish job would never fire.

on:
  push:
    branches: [main]
    paths:
      - "mods/**"
      - "package.json"
      - "package-lock.json"
      - "lerna.json"
  workflow_dispatch:

# Never run two releases at once; don't cancel an in-flight one mid-push.
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Version and tag
        run: npx lerna version --conventional-commits --yes
