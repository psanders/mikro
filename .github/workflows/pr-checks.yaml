name: PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-checks-${{ github.ref }}
  cancel-in-progress: true

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

jobs:
  lock-check:
    name: Lock file in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      # Verify the lock is in sync with every workspace package.json. `npm ci`
      # is the right gate: it FAILS when a dependency in a package.json is not
      # satisfied by the lock, but never rewrites the lock, so it is immune to
      # the cross-platform nondeterminism that made the old "regenerate + git
      # diff" gate flap forever. That gate ran `npm install --package-lock-only`
      # and diffed the result — but npm's arborist stamps a cosmetic `"peer":
      # true` flag on os/cpu-gated optional binaries (esbuild, rolldown, …)
      # differently on macOS vs Linux. The committed lock is generated on a
      # contributor's Mac (with the flag); this Linux runner stripped it and the
      # diff "failed" on pure noise, even though the lock installed cleanly. See
      # AGENTS.md → "Lockfile discipline".
      - name: Check lock file is in sync
        run: npm ci --ignore-scripts

      # The genuinely valuable, deterministic check npm itself does not do:
      # guard against platform narrowing and unresolvable edges (see the script).
      - name: Check lock file platform coverage
        run: node .scripts/check-lockfile-platforms.mjs

  # The iOS half of mobile CI. There is deliberately NO GitHub Actions job
  # that compiles iOS: macOS runners burn a 10x minutes multiplier and
  # device-installable IPAs need Apple signing that EAS already manages.
  # Real iOS binaries come from `eas build`; JS-only changes ship over the
  # air via `eas update`. What CI can catch cheaply on Linux is everything
  # in front of the native compile: types, unit tests, and `expo prebuild`,
  # which resolves every config plugin and fails on broken native config
  # (this exact class of bug shipped once: expo-print listed as a plugin).
  mobile-checks:
    name: Mobile typecheck, tests, native config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      # Mobile imports router types from @mikro/apiserver dist.
      - name: Build apiserver types
        run: npm run build -w @mikro/apiserver

      - name: Typecheck
        run: npm run typecheck -w @mikro/mobile

      - name: Unit tests
        run: npm test -w @mikro/mobile

      - name: Validate native config (expo prebuild, both platforms)
        working-directory: mods/mobile
        run: npx expo prebuild --platform all --no-install
