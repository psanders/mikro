name: Publish API Server

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to lerna.json)"
        required: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"

# Serialize publishes. All runs push the shared `latest` tag, so overlapping
# builds race on it (last writer wins) — a slower older-version build can
# finish last and clobber `latest` with a stale image. Queue instead of
# cancel so every tagged release still publishes its versioned image.
concurrency:
  group: publish-apiserver
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build
          npm run db:generate -w @mikro/apiserver

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Get version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "LERNA_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
            echo "LERNA_VERSION=${tag#v}" >> $GITHUB_ENV
          else
            lerna_version=$(node -p "require('./lerna.json').version")
            echo "LERNA_VERSION=$lerna_version" >> $GITHUB_ENV
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GitHub Container Registry
        uses: docker/build-push-action@v6
        with:
          file: mods/apiserver/Dockerfile
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/psanders/mikro:latest
            ghcr.io/psanders/mikro:${{ env.LERNA_VERSION }}
