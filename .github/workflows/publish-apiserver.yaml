name: Publish API Server

on:
  push:
    tags:
      - "v*"
    branches:
      - main
    paths:
      - "mods/apiserver/**"
      - "mods/common/**"
      - "lerna.json"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (defaults to lerna.json)"
        required: false

env:
  COREPACK_ENABLE_DOWNLOAD_PROMPT: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Serialize publishes. All runs push the shared `latest` tag, so overlapping
# builds race on it (last writer wins) — a slower older-version build can
# finish last and clobber `latest` with a stale image. Queue instead of
# cancel so every tagged release still publishes its versioned image.
concurrency:
  group: publish-apiserver
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: |
          npm run build
          npm run db:generate -w @mikro/apiserver

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "LERNA_VERSION=${{ inputs.version }}" >> $GITHUB_ENV
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
            echo "LERNA_VERSION=${tag#v}" >> $GITHUB_ENV
          else
            lerna_version=$(node -p "require('./lerna.json').version")
            echo "LERNA_VERSION=$lerna_version" >> $GITHUB_ENV
          fi

      - name: Publish to Docker Hub
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: psanders/mikro
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          dockerfile: mods/apiserver/Dockerfile
          context: .
          platforms: linux/amd64
          tags: "latest,${{ env.LERNA_VERSION }}"
