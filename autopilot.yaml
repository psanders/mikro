          telephonyContext:
            callDirection: TO_PSTN
            ingressNumber: '+18091234567'
            callerNumber: '+18091234567'
            metadata:
              memberName: 'Juan Pérez'
              loanId: 'LN-2025-00412'
              principal: '25000'
              paymentAmount: '5000'
              paymentFrequency: 'mensual'
              missedPayments: '3'
          conversation:
            - userInput: "Sí, dígame."
              expected:
                text:
                  type: SIMILAR
                  response: "¿Hablo con el señor Juan Pérez?"
            - userInput: "Sí, soy yo."
              expected:
                text:
                  type: SIMILAR
                  response: "Señor Pérez, su cuenta tiene 3 pagos en mora de 5,000 pesos cada uno. ¿Para qué día podría ponerse al día?"
            - userInput: "Puedo pagar el viernes."
              expected:
                text:
                  type: SIMILAR
                  response: "Perfecto, queda registrado su compromiso para el viernes. Que tenga buen día."

