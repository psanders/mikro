name: "Agente de Cobranza Mikro Créditos"
ref: e76166a5-a2bc-470b-b1a4-7f6196a45de1
type: "AUTOPILOT"
speechToText:
  productRef: "stt.deepgram"
  config:
    model: "nova-3"
    languageCode: "es-ES"
